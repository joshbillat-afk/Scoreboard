<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Scoreboard">
    <link rel="manifest" href="manifest.json">
    <title>Daily Scoreboard</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --surface: #1a1a1a;
            --player: #4ade80; 
            --day: #f87171;    
            --text: #ffffff;
            --muted: #666666;
            --glow-player: rgba(74, 222, 128, 0.6);
            --glow-day: rgba(248, 113, 113, 0.6);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text); display: flex; flex-direction: column; min-height: 100vh; padding: 20px; padding-top: 60px; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        /* Header */
        .header { text-align: center; margin-bottom: 30px; }
        .quarter-badge { display: inline-block; background: var(--surface); padding: 8px 16px; border-radius: 20px; font-weight: 800; font-size: 14px; letter-spacing: 2px; color: #aaaaaa; border: 1px solid #333; }
        
        /* Scoreboard */
        .scoreboard { 
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--surface); border-radius: 24px; padding: 30px 20px; 
            margin-bottom: 40px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 2px solid #333;
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
        }
        /* Dynamic Momentum Borders */
        .scoreboard.winning { border-color: var(--player); box-shadow: 0 0 20px var(--glow-player); }
        .scoreboard.losing { border-color: var(--day); box-shadow: 0 0 20px var(--glow-day); }

        .team { display: flex; flex-direction: column; align-items: center; width: 40%; }
        .team-name { font-size: 14px; font-weight: 800; letter-spacing: 3px; margin-bottom: 10px; opacity: 0.9; }
        .you-name { color: var(--player); }
        .day-name { color: var(--day); }
        
        /* Glowing LED Scores */
        .score { 
            font-size: 80px; font-weight: 900; line-height: 1; 
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .score-you-text { color: #fff; text-shadow: 0 0 15px var(--glow-player); }
        .score-day-text { color: #fff; text-shadow: 0 0 15px var(--glow-day); }
        
        /* Pop Animation */
        .score.pop { transform: scale(1.3); }

        .divider { font-size: 40px; color: var(--muted); font-weight: 300; }

        /* 3D Tactile Buttons */
        .controls { display: flex; justify-content: space-between; gap: 15px; margin-bottom: 50px; }
        .btn { 
            flex: 1; padding: 20px 10px; border: none; border-radius: 16px; 
            font-size: 18px; font-weight: 900; letter-spacing: 1px; color: #000; 
            cursor: pointer; transition: all 0.1s;
            position: relative; top: 0;
        }
        .btn-you { background-color: var(--player); box-shadow: 0 6px 0 #166534; }
        .btn-you:active { top: 6px; box-shadow: 0 0px 0 #166534; }
        
        .btn-day { background-color: var(--day); box-shadow: 0 6px 0 #991b1b; }
        .btn-day:active { top: 6px; box-shadow: 0 0px 0 #991b1b; }

        /* Weekly Progress */
        .weekly-section { margin-top: auto; padding-bottom: 30px; }
        .section-title { font-size: 13px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; text-align: center; }
        .week-grid { display: flex; justify-content: space-between; gap: 8px; }
        .day-card { flex: 1; background: var(--surface); border-radius: 12px; padding: 12px 0; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 8px; border: 1px solid #222; }
        .day-label { font-size: 12px; font-weight: 800; color: var(--muted); }
        .status-dot { width: 14px; height: 14px; border-radius: 50%; background: #333; transition: all 0.3s ease; }
        
        .dot-win { background-color: var(--player); box-shadow: 0 0 10px var(--glow-player); }
        .dot-loss { background-color: var(--day); box-shadow: 0 0 10px var(--glow-day); }
    </style>
</head>
<body>

    <div class="header">
        <div class="quarter-badge" id="quarter-display">LOADING...</div>
    </div>

    <div class="scoreboard" id="main-scoreboard">
        <div class="team">
            <div class="team-name you-name">YOU</div>
            <div class="score score-you-text" id="score-you">0</div>
        </div>
        <div class="divider">-</div>
        <div class="team">
            <div class="team-name day-name">THE DAY</div>
            <div class="score score-day-text" id="score-day">0</div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-you" onclick="addPoint('you')">+1 YOU</button>
        <button class="btn btn-day" onclick="addPoint('day')">+1 DAY</button>
    </div>

    <div class="weekly-section">
        <div class="section-title">SERIES TRACKER</div>
        <div class="week-grid" id="week-grid">
            </div>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('scoreboardData')) || {
            date: new Date().toDateString(),
            you: 0,
            day: 0,
            history: [0,0,0,0,0,0,0] 
        };

        const todayStr = new Date().toDateString();
        if (data.date !== todayStr) {
            let yesterdayDate = new Date(data.date);
            let dayIndex = yesterdayDate.getDay() === 0 ? 6 : yesterdayDate.getDay() - 1; 
            
            if (data.you > data.day) data.history[dayIndex] = 1;
            else if (data.day > data.you) data.history[dayIndex] = -1;

            data.date = todayStr;
            data.you = 0;
            data.day = 0;
            
            if (new Date().getDay() === 1) data.history = [0,0,0,0,0,0,0];
            saveData();
        }

        function saveData() {
            localStorage.setItem('scoreboardData', JSON.stringify(data));
            updateUI();
        }

        function triggerPopAnimation(elementId) {
            const el = document.getElementById(elementId);
            el.classList.add('pop');
            setTimeout(() => el.classList.remove('pop'), 150);
        }

        function addPoint(team) {
            if (team === 'you') {
                data.you++;
                triggerPopAnimation('score-you');
            }
            if (team === 'day') {
                data.day++;
                triggerPopAnimation('score-day');
            }
            saveData();
        }

        function updateUI() {
            document.getElementById('score-you').innerText = data.you;
            document.getElementById('score-day').innerText = data.day;

            // Momentum Styling
            const board = document.getElementById('main-scoreboard');
            if (data.you > data.day) {
                board.className = 'scoreboard winning';
            } else if (data.day > data.you) {
                board.className = 'scoreboard losing';
            } else {
                board.className = 'scoreboard';
            }

            // Quarter Logic
            const hour = new Date().getHours();
            let qText = "POSTGAME";
            if (hour >= 8 && hour < 12) qText = "1ST QUARTER";
            else if (hour >= 12 && hour < 16) qText = "2ND QUARTER";
            else if (hour >= 16 && hour < 20) qText = "3RD QUARTER";
            else if (hour >= 20 && hour < 24) qText = "4TH QUARTER";
            else if (hour >= 0 && hour < 8) qText = "PREGAME";
            document.getElementById('quarter-display').innerText = qText;

            // Weekly Grid
            const grid = document.getElementById('week-grid');
            grid.innerHTML = '';
            const days = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];
            let currentDayIndex = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;

            days.forEach((label, index) => {
                let statusClass = '';
                if (index < currentDayIndex) {
                    if (data.history[index] === 1) statusClass = 'dot-win';
                    if (data.history[index] === -1) statusClass = 'dot-loss';
                } else if (index === currentDayIndex) {
                    if (data.you > data.day) statusClass = 'dot-win';
                    else if (data.day > data.you) statusClass = 'dot-loss';
                }

                grid.innerHTML += `
                    <div class="day-card">
                        <div class="day-label">${label}</div>
                        <div class="status-dot ${statusClass}"></div>
                    </div>
                `;
            });
        }

        updateUI();
        setInterval(updateUI, 60000); 
    </script>
</body>
</html>
